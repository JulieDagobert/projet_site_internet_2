<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Galerie d'images</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="galerie">
        <!-- Boucle SPIP sur les images jointes à l'article -->
        <BOUCLE_images(DOCUMENTS) {id_article}>
            <!-- Affiche l'image sans lien autour -->
            <img src="[(#URL_FICHIER)]" alt="" />
        </BOUCLE_images>
    </div>
    
    <!-- Script pour mélanger les images aléatoirement à chaque chargement -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var container = document.querySelector('.galerie');
            if (container) {
                for (var i = container.children.length; i >= 0; i--) {
                    container.appendChild(container.children[Math.random() * i | 0]);
                }
            }
        });
    </script>
</body>
</html>
